<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navy Soundboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            950: '#0a101d',
                            900: '#111827',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                            400: '#94a3b8',
                            300: '#cbd5e1',
                            200: '#e2e8f0',
                            100: '#f1f5f9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body.has-bg {
            background-size: 100vw 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        /* Override main screen elements with transparent black when an image is active.
           The library view is purposefully excluded so it remains solid navy. */
        body.has-bg #main-view > div, 
        body.has-bg #main-title,
        body.has-bg #keyboard-container div.bg-navy-800,
        body.has-bg #keyboard-container div.bg-navy-700,
        body.has-bg > .h-16,
        body.has-bg #btn-open-library,
        body.has-bg #bind-overlay > div,
        body.has-bg #presets-bar button,
        body.has-bg #preset-tabs button,
        body.has-bg #preset-modal > div {
            background-color: rgba(0, 0, 0, 0.45) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        /* Apply background blur for better legibility on custom backgrounds */
        body.has-bg #keyboard-container div,
        body.has-bg #main-title {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-navy-950 text-navy-100 h-screen overflow-hidden flex flex-col font-sans select-none">

    <!-- Main View -->
    <div id="main-view" class="flex-1 flex flex-col items-center justify-center p-4 relative w-full max-w-6xl mx-auto">
        <h1 id="main-title" class="text-3xl font-bold text-navy-200 mb-6 px-6 py-2 rounded border border-transparent transition-colors">Soundboard</h1>
        
        <!-- Presets Row -->
        <div id="presets-bar" class="w-full max-w-4xl flex items-center justify-between mb-4 gap-4 px-2">
            <div class="flex items-center gap-1.5 overflow-x-auto py-1 scrollbar-none" id="preset-tabs">
                <!-- Preset tabs loaded via JS -->
            </div>
            <button id="btn-add-preset" class="px-3 py-1.5 bg-navy-800 hover:bg-navy-700 text-sm border border-navy-700 rounded text-navy-200 shrink-0 font-semibold flex items-center gap-1 transition-colors">
                <span>+</span><span>Add Preset</span>
            </button>
        </div>

        <div id="keyboard-container" class="flex flex-col gap-1.5 bg-navy-900 p-6 rounded border border-navy-800">
            <!-- Keyboard rows will be generated here -->
        </div>

        <!-- Spacebar Hint visually represented -->
        <div class="mt-4 w-[600px] h-12 border border-navy-700 bg-navy-800 text-navy-400 flex items-center justify-center gap-6 rounded uppercase tracking-widest text-sm">
            <span>Spacebar - Stop All</span>
            <span class="w-px h-6 bg-navy-700"></span>
            <span>Tab - Loop Last Played</span>
        </div>
    </div>

    <!-- Library Modal -->
    <div id="library-view" class="hidden absolute inset-0 bg-navy-950 z-40 flex flex-col">
        <div class="flex items-center justify-between p-6 bg-navy-900 border-b border-navy-800">
            <h2 class="text-2xl font-bold text-navy-100">Sound Library</h2>
            <button id="btn-close-library" class="px-4 py-2 bg-navy-800 hover:bg-navy-700 border border-navy-700 rounded text-navy-200">
                Back (Esc)
            </button>
        </div>

        <div class="p-6 max-w-4xl mx-auto w-full flex-1 flex flex-col overflow-hidden">
            <!-- Upload Section -->
            <div class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-navy-900 p-4 rounded border border-navy-800">
                    <label class="block mb-2 font-bold text-navy-200">Upload New Sounds (Multiple Allowed)</label>
                    <input type="file" id="upload-input" accept="audio/*" multiple class="block w-full text-sm text-navy-300 
                        file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 
                        file:text-sm file:font-semibold file:bg-navy-700 file:text-navy-100 
                        hover:file:bg-navy-600 cursor-pointer"/>
                </div>
                <div class="bg-navy-900 p-4 rounded border border-navy-800">
                    <label class="block mb-2 font-bold text-navy-200">Upload Background Image</label>
                    <input type="file" id="bg-upload-input" accept="image/*" class="block w-full text-sm text-navy-300 
                        file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 
                        file:text-sm file:font-semibold file:bg-navy-700 file:text-navy-100 
                        hover:file:bg-navy-600 cursor-pointer"/>
                    <button id="btn-clear-bg" class="mt-2 text-sm text-red-400 hover:text-red-300 hidden font-semibold">Clear Background</button>
                </div>
            </div>

            <!-- List Section -->
            <div class="flex-1 overflow-y-auto pr-2" id="sound-list">
                <!-- Sounds injected via JS -->
            </div>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="h-16 bg-navy-900 border-t border-navy-800 flex items-center px-6 justify-between z-30">
        <div class="text-sm text-navy-400">Audio ready</div>
        <button id="btn-open-library" class="p-2 bg-navy-800 hover:bg-navy-700 border border-navy-700 rounded flex items-center gap-2" title="Open Sound Library">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
            <span class="font-semibold">Library</span>
        </button>
    </div>

    <!-- Key Bind Overlay -->
    <div id="bind-overlay" class="hidden absolute inset-0 bg-navy-950/90 z-50 flex items-center justify-center">
        <div class="bg-navy-900 p-8 rounded border border-navy-700 text-center shadow-lg">
            <h3 class="text-xl font-bold text-navy-100 mb-2">Press any key to bind</h3>
            <p class="text-navy-300 mb-6">Target: <span id="bind-target-name" class="font-bold text-white"></span></p>
            <p class="text-sm text-navy-400">Press [Esc] to cancel</p>
        </div>
    </div>

    <!-- Edit Preset Modal -->
    <div id="preset-modal" class="hidden absolute inset-0 bg-navy-950/90 z-50 flex items-center justify-center">
        <div class="bg-navy-900 p-6 rounded border border-navy-700 w-80 shadow-lg">
            <h3 class="text-lg font-bold text-navy-100 mb-4 text-center">Edit Preset</h3>
            <input type="text" id="preset-name-input" class="w-full bg-navy-950 border border-navy-700 rounded px-3 py-2 text-navy-100 mb-4 focus:outline-none focus:border-blue-500" placeholder="Preset Name">
            <div class="flex gap-2 justify-end">
                <button id="btn-delete-preset" class="px-3 py-1.5 bg-red-900/50 hover:bg-red-900/80 border border-red-800 text-red-200 rounded text-sm font-semibold transition-colors">Delete</button>
                <button id="btn-cancel-preset" class="px-3 py-1.5 bg-navy-800 hover:bg-navy-700 border border-navy-700 rounded text-navy-200 text-sm font-semibold transition-colors">Cancel</button>
                <button id="btn-save-preset" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded text-white text-sm font-semibold transition-colors">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- Database Setup (IndexedDB with multi-store support for settings and presets) ---
        const DB_NAME = 'NavySoundboardDB';
        const STORE_NAME = 'sounds';
        const SETTINGS_STORE = 'settings';
        const PRESETS_STORE = 'presets';
        const DB_VERSION = 3;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains(SETTINGS_STORE)) {
                        db.createObjectStore(SETTINGS_STORE, { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains(PRESETS_STORE)) {
                        db.createObjectStore(PRESETS_STORE, { keyPath: 'id' });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveSetting(id, value) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SETTINGS_STORE, 'readwrite');
                tx.objectStore(SETTINGS_STORE).put({ id, value });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getSetting(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SETTINGS_STORE, 'readonly');
                const req = tx.objectStore(SETTINGS_STORE).get(id);
                req.onsuccess = () => resolve(req.result ? req.result.value : null);
                req.onerror = () => reject(req.error);
            });
        }

        async function deleteSetting(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SETTINGS_STORE, 'readwrite');
                tx.objectStore(SETTINGS_STORE).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function saveSound(sound) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).put(sound);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getSounds() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const req = tx.objectStore(STORE_NAME).getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function deleteSound(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function savePreset(preset) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(PRESETS_STORE, 'readwrite');
                tx.objectStore(PRESETS_STORE).put(preset);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getPresets() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(PRESETS_STORE, 'readonly');
                const req = tx.objectStore(PRESETS_STORE).getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function deletePreset(id) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(PRESETS_STORE, 'readwrite');
                tx.objectStore(PRESETS_STORE).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // --- Keyboard Layout Data ---
        const kbLayout = [
            [
                {code: 'Backquote', label: '`'}, {code: 'Digit1', label: '1'}, {code: 'Digit2', label: '2'},
                {code: 'Digit3', label: '3'}, {code: 'Digit4', label: '4'}, {code: 'Digit5', label: '5'},
                {code: 'Digit6', label: '6'}, {code: 'Digit7', label: '7'}, {code: 'Digit8', label: '8'},
                {code: 'Digit9', label: '9'}, {code: 'Digit0', label: '0'}, {code: 'Minus', label: '-'},
                {code: 'Equal', label: '='}, {code: 'Backspace', label: 'Backspace', width: 'w-24'}
            ],
            [
                {code: 'Tab', label: 'Tab', width: 'w-20'}, {code: 'KeyQ', label: 'Q'}, {code: 'KeyW', label: 'W'},
                {code: 'KeyE', label: 'E'}, {code: 'KeyR', label: 'R'}, {code: 'KeyT', label: 'T'},
                {code: 'KeyY', label: 'Y'}, {code: 'KeyU', label: 'U'}, {code: 'KeyI', label: 'I'},
                {code: 'KeyO', label: 'O'}, {code: 'KeyP', label: 'P'}, {code: 'BracketLeft', label: '['},
                {code: 'BracketRight', label: ']'}, {code: 'Backslash', label: '\\', width: 'w-16'}
            ],
            [
                {code: 'CapsLock', label: 'Caps', width: 'w-24'}, {code: 'KeyA', label: 'A'}, {code: 'KeyS', label: 'S'},
                {code: 'KeyD', label: 'D'}, {code: 'KeyF', label: 'F'}, {code: 'KeyG', label: 'G'},
                {code: 'KeyH', label: 'H'}, {code: 'KeyJ', label: 'J'}, {code: 'KeyK', label: 'K'},
                {code: 'KeyL', label: 'L'}, {code: 'Semicolon', label: ';'}, {code: 'Quote', label: "'"},
                {code: 'Enter', label: 'Enter', width: 'w-24'}
            ],
            [
                {code: 'ShiftLeft', label: 'Shift', width: 'w-32'}, {code: 'KeyZ', label: 'Z'}, {code: 'KeyX', label: 'X'},
                {code: 'KeyC', label: 'C'}, {code: 'KeyV', label: 'V'}, {code: 'KeyB', label: 'B'},
                {code: 'KeyN', label: 'N'}, {code: 'KeyM', label: 'M'}, {code: 'Comma', label: ','},
                {code: 'Period', label: '.'}, {code: 'Slash', label: '/'}, {code: 'ShiftRight', label: 'Shift', width: 'w-32'}
            ]
        ];

        // Ensure we easily know valid keys
        const validKeyCodes = new Set(kbLayout.flat().map(k => k.code));
        validKeyCodes.delete('Tab'); // Tab is reserved for looping

        // --- Application State ---
        let sounds = [];
        let presets = [];
        let activePresetId = null;
        let audioPlayers = {}; // Mapping { soundId: Audio }
        let state = {
            isLibraryOpen: false,
            bindingSoundId: null, // If set, we are listening for a key to bind
            lastPlayedSoundId: null, // Track the last played sound
            editingPresetId: null // The preset currently being renamed/deleted
        };

        // --- Synchronized Marquee State Tracker ---
        let marqueeElements = [];
        let globalMarqueeState = {
            phase: 'scrolling', // 'scrolling' | 'waiting'
            elapsedTime: 0,
            scrollDuration: 0,
            cooldownDuration: 5000 // 5 seconds pause
        };

        // --- UI Elements ---
        const kbContainer = document.getElementById('keyboard-container');
        const soundList = document.getElementById('sound-list');
        const libraryView = document.getElementById('library-view');
        const bindOverlay = document.getElementById('bind-overlay');
        const bindTargetName = document.getElementById('bind-target-name');
        const presetTabs = document.getElementById('preset-tabs');
        const btnAddPreset = document.getElementById('btn-add-preset');
        const presetModal = document.getElementById('preset-modal');
        const presetNameInput = document.getElementById('preset-name-input');

        // --- Initialization ---
        async function init() {
            renderKeyboard();
            await reloadData();
            await loadSettings();
            setupEventListeners();
            requestAnimationFrame(marqueeTick);
        }

        async function loadSettings() {
            const bgImage = await getSetting('bgImage');
            applyBackground(bgImage);
        }

        function applyBackground(dataUrl) {
            const clearBtn = document.getElementById('btn-clear-bg');
            if (dataUrl) {
                document.body.style.backgroundImage = `url(${dataUrl})`;
                document.body.classList.add('has-bg');
                clearBtn.classList.remove('hidden');
            } else {
                document.body.style.backgroundImage = '';
                document.body.classList.remove('has-bg');
                clearBtn.classList.add('hidden');
            }
        }

        async function reloadData() {
            sounds = await getSounds();
            let allPresets = await getPresets();
            let activeId = await getSetting('activePresetId');

            // Initialize presets if empty (Safe database setup/migration path)
            if (allPresets.length === 0) {
                const initialPreset = {
                    id: 'preset-1',
                    name: 'Preset 1',
                    bindings: {}
                };

                // Migrate legacy key binds from old sound model to our centralized Preset 1 bindings
                sounds.forEach(sound => {
                    if (sound.key) {
                        initialPreset.bindings[sound.key] = sound.id;
                    }
                });

                await savePreset(initialPreset);
                allPresets.push(initialPreset);
                activeId = 'preset-1';
                await saveSetting('activePresetId', activeId);
            }

            // Fallback for missing/deleted active preset index references
            if (!activeId || !allPresets.some(p => p.id === activeId)) {
                activeId = allPresets[0].id;
                await saveSetting('activePresetId', activeId);
            }

            presets = allPresets;
            activePresetId = activeId;

            // Enable/Disable "Add Preset" depending on max limit (Max: 10 Presets)
            if (presets.length >= 10) {
                btnAddPreset.disabled = true;
                btnAddPreset.classList.add('opacity-50', 'cursor-not-allowed');
                btnAddPreset.title = "Maximum of 10 presets reached";
            } else {
                btnAddPreset.disabled = false;
                btnAddPreset.classList.remove('opacity-50', 'cursor-not-allowed');
                btnAddPreset.title = "";
            }

            renderPresetsBar();
            updateKeyboardVisuals();
            renderLibraryList();
        }

        // --- Presets Rendering & Events ---
        function renderPresetsBar() {
            presetTabs.innerHTML = '';
            presets.forEach(preset => {
                const isActive = preset.id === activePresetId;
                const tab = document.createElement('div');
                tab.className = `flex items-center gap-1 px-3 py-1.5 text-sm font-semibold rounded border transition-all cursor-pointer select-none shrink-0 
                    ${isActive ? 'bg-blue-600 border-blue-500 text-white' : 'bg-navy-800 border-navy-700 text-navy-400 hover:bg-navy-700 hover:text-navy-200'}`;
                
                tab.innerHTML = `
                    <span class="tab-label truncate max-w-[120px]">${preset.name}</span>
                `;

                if (isActive) {
                    // Inject edit gear icon
                    const editBtn = document.createElement('button');
                    editBtn.className = "ml-1.5 text-blue-200 hover:text-white transition-colors focus:outline-none";
                    editBtn.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                        </svg>
                    `;
                    editBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openPresetModal(preset.id);
                    });
                    tab.appendChild(editBtn);
                }

                tab.addEventListener('click', () => switchPreset(preset.id));
                presetTabs.appendChild(tab);
            });
        }

        async function switchPreset(id) {
            if (activePresetId === id) return;
            activePresetId = id;
            await saveSetting('activePresetId', id);
            
            // Stop playing audio assets before layout switch
            stopAll();
            await reloadData();
        }

        async function addNewPreset() {
            if (presets.length >= 10) return;

            const newId = `preset-${Date.now()}`;
            const newPreset = {
                id: newId,
                name: `Preset ${presets.length + 1}`,
                bindings: {}
            };

            await savePreset(newPreset);
            await saveSetting('activePresetId', newId);
            await reloadData();
        }

        function openPresetModal(presetId) {
            const preset = presets.find(p => p.id === presetId);
            if (!preset) return;

            state.editingPresetId = presetId;
            presetNameInput.value = preset.name;

            // Hide delete option if this is the last remaining preset left
            const deleteBtn = document.getElementById('btn-delete-preset');
            if (presets.length <= 1) {
                deleteBtn.classList.add('hidden');
            } else {
                deleteBtn.classList.remove('hidden');
            }

            presetModal.classList.remove('hidden');
            presetNameInput.focus();
        }

        function closePresetModal() {
            state.editingPresetId = null;
            presetModal.classList.add('hidden');
        }

        async function savePresetName() {
            const id = state.editingPresetId;
            const newName = presetNameInput.value.trim();
            if (!newName || !id) return;

            const preset = presets.find(p => p.id === id);
            if (preset) {
                preset.name = newName;
                await savePreset(preset);
                closePresetModal();
                await reloadData();
            }
        }

        async function deleteActivePreset() {
            const id = state.editingPresetId;
            if (!id || presets.length <= 1) return;

            await deletePreset(id);
            closePresetModal();

            // Shift active preset index safely to first remaining preset left in storage
            const remaining = presets.filter(p => p.id !== id);
            await saveSetting('activePresetId', remaining[0].id);
            await reloadData();
        }

        // --- DOM Rendering (Keyboard) ---
        function renderKeyboard() {
            kbContainer.innerHTML = '';
            kbLayout.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'flex justify-center gap-1.5';
                
                row.forEach(key => {
                    const keyEl = document.createElement('div');
                    keyEl.id = `key-${key.code}`;
                    keyEl.className = `h-14 flex items-center justify-center border rounded ${key.width || 'w-14'} 
                        font-bold text-sm transition-colors duration-100 bg-navy-800 border-navy-700 text-navy-400`;
                    keyEl.innerText = key.label;
                    rowEl.appendChild(keyEl);
                });
                
                kbContainer.appendChild(rowEl);
            });
        }

        function updateKeyboardVisuals() {
            const activePreset = presets.find(p => p.id === activePresetId);
            if (!activePreset) return;

            // Reset all keys to default
            kbLayout.flat().forEach(key => {
                const el = document.getElementById(`key-${key.code}`);
                if (!el) return;
                
                // Base Classes
                el.className = `h-14 flex flex-col items-center justify-center border rounded ${key.width || 'w-14'} font-bold transition-colors duration-100`;
                el.innerHTML = `<span>${key.label}</span>`;
                
                // Check mapped values inside our active preset file dictionary
                const boundSoundId = activePreset.bindings[key.code];
                const boundSound = boundSoundId ? sounds.find(s => s.id === boundSoundId) : null;
                
                if (boundSound) {
                    const audio = audioPlayers[boundSound.id];
                    let isPlaying = audio && !audio.paused && audio.currentTime > 0;
                    let isPaused = audio && audio.paused && audio.currentTime > 0;

                    // Add structured scrollable marquee label container
                    el.innerHTML += `
                        <div class="marquee-container overflow-hidden w-full text-center relative h-5 mt-0.5">
                            <span class="marquee-text whitespace-nowrap inline-block text-[0.6rem] font-normal opacity-75" style="position: absolute; left: 50%; transform: translateX(-50%);">${boundSound.name}</span>
                        </div>
                    `;
                    el.title = boundSound.name;

                    if (isPlaying) {
                        // Playing state
                        el.classList.add('bg-blue-300', 'border-blue-200', 'text-navy-950');
                    } else if (isPaused) {
                        // Paused state
                        el.classList.add('bg-blue-600', 'border-blue-500', 'text-blue-100');
                    } else {
                        // Bound but idle
                        el.classList.add('bg-navy-700', 'border-navy-600', 'text-navy-100');
                    }
                } else {
                    // Unbound
                    el.classList.add('bg-navy-800', 'border-navy-700', 'text-navy-400');
                    el.title = "Unbound";
                }
            });

            // Re-measure and calibrate scroll positions after the elements render
            requestAnimationFrame(() => {
                initMarquees();
            });
        }

        // --- Synchronized Marquee Logic ---
        function initMarquees() {
            marqueeElements = [];
            const containers = document.querySelectorAll('.marquee-container');
            let maxScrollVal = 0;

            containers.forEach(container => {
                const textEl = container.querySelector('.marquee-text');
                if (!textEl) return;

                const containerWidth = container.offsetWidth;
                const textWidth = textEl.scrollWidth;

                // Only apply scroll behavior if text width exceeds container width
                if (textWidth > containerWidth) {
                    textEl.style.left = '0px';
                    textEl.style.transform = 'translateX(0px)';
                    
                    const maxScroll = textWidth - containerWidth + 6; // extra small padding offset
                    if (maxScroll > maxScrollVal) {
                        maxScrollVal = maxScroll;
                    }

                    marqueeElements.push({
                        textEl,
                        maxScroll,
                        currentX: 0
                    });
                } else {
                    textEl.style.left = '50%';
                    textEl.style.transform = 'translateX(-50%)';
                }
            });

            // Scrolling speed: 20px per second
            globalMarqueeState.scrollDuration = maxScrollVal > 0 ? (maxScrollVal / 20) * 1000 : 0;
            globalMarqueeState.elapsedTime = 0;
            globalMarqueeState.phase = 'scrolling';
        }

        let lastTime = 0;
        function marqueeTick(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;

            if (marqueeElements.length > 0 && globalMarqueeState.scrollDuration > 0) {
                globalMarqueeState.elapsedTime += delta;

                if (globalMarqueeState.phase === 'scrolling') {
                    // Check if the longest scroll duration has finished
                    if (globalMarqueeState.elapsedTime >= globalMarqueeState.scrollDuration) {
                        globalMarqueeState.phase = 'waiting';
                        globalMarqueeState.elapsedTime = 0;
                    }

                    marqueeElements.forEach(item => {
                        const itemDuration = (item.maxScroll / 20) * 1000;
                        if (globalMarqueeState.elapsedTime < itemDuration) {
                            // Translate leftward
                            item.currentX = - (20 * globalMarqueeState.elapsedTime) / 1000;
                        } else {
                            // Finished scrolling! Immediately snap back to the beginning of the name (0px)
                            item.currentX = 0;
                        }
                        item.textEl.style.transform = `translateX(${item.currentX}px)`;
                    });
                } else if (globalMarqueeState.phase === 'waiting') {
                    // Check if global synchronized 5-second waiting phase is over
                    if (globalMarqueeState.elapsedTime >= globalMarqueeState.cooldownDuration) {
                        globalMarqueeState.phase = 'scrolling';
                        globalMarqueeState.elapsedTime = 0;
                    }

                    // Keep all texts static at 0 (beginning) during cooldown
                    marqueeElements.forEach(item => {
                        item.currentX = 0;
                        item.textEl.style.transform = `translateX(0px)`;
                    });
                }
            } else {
                // Keep everything static at 0 if no scrolling texts exist
                marqueeElements.forEach(item => {
                    item.textEl.style.transform = `translateX(0px)`;
                });
            }

            requestAnimationFrame(marqueeTick);
        }

        function renderLibraryList() {
            soundList.innerHTML = '';
            if (sounds.length === 0) {
                soundList.innerHTML = `<div class="text-navy-400 text-center py-8 border border-dashed border-navy-700 rounded">No sounds uploaded yet.</div>`;
                return;
            }

            const activePreset = presets.find(p => p.id === activePresetId);

            sounds.forEach(sound => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between p-4 bg-navy-800 mb-2 rounded border border-navy-700';
                
                // Read bound keys specific to active preset
                let keyLabel = 'None';
                if (activePreset) {
                    const boundKey = Object.keys(activePreset.bindings).find(k => activePreset.bindings[k] === sound.id);
                    if (boundKey) {
                        keyLabel = kbLayout.flat().find(k => k.code === boundKey)?.label || boundKey;
                    }
                }

                row.innerHTML = `
                    <div class="flex-1 overflow-hidden pr-4 flex flex-col gap-1">
                        <input type="text" class="sound-name-input bg-transparent font-semibold text-navy-100 truncate w-full border-b border-transparent focus:border-navy-400 outline-none px-1 -ml-1 transition-colors" data-id="${sound.id}" value="${sound.name}">
                        <div class="text-sm text-navy-400">Assigned Key: <span class="font-mono bg-navy-950 px-1 py-0.5 rounded border border-navy-700 ml-1 text-navy-200">${keyLabel}</span></div>
                    </div>
                    <div class="flex gap-2">
                        <button class="btn-bind px-3 py-1.5 bg-navy-700 hover:bg-navy-600 text-white rounded text-sm border border-navy-600" data-id="${sound.id}">
                            ${keyLabel !== 'None' ? 'Re-bind Key' : 'Bind Key'}
                        </button>
                        <button class="btn-delete px-3 py-1.5 bg-red-900/50 hover:bg-red-900/80 border border-red-800 text-red-200 rounded text-sm" data-id="${sound.id}">
                            Delete
                        </button>
                    </div>
                `;
                soundList.appendChild(row);
            });

            // Attach listeners to buttons
            document.querySelectorAll('.sound-name-input').forEach(input => {
                input.addEventListener('change', async (e) => {
                    const sound = sounds.find(s => s.id === e.target.dataset.id);
                    if (sound) {
                        sound.name = e.target.value.trim() || "Unnamed Sound";
                        await saveSound(sound);
                        updateKeyboardVisuals(); // Update titles on the keyboard map
                    }
                });
            });

            document.querySelectorAll('.btn-bind').forEach(btn => {
                btn.addEventListener('click', () => startBinding(btn.dataset.id));
            });
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', () => deleteSoundHandler(btn.dataset.id));
            });
        }

        // --- Actions ---
        async function handleUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const uploadPromises = files.map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const newSound = {
                            // Generating highly collision-safe unique IDs for multi-uploads
                            id: Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9),
                            name: file.name,
                            data: ev.target.result
                        };
                        await saveSound(newSound);
                        resolve();
                    };
                    reader.readAsDataURL(file);
                });
            });

            await Promise.all(uploadPromises);
            document.getElementById('upload-input').value = '';
            await reloadData();
        }

        async function handleBgUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const dataUrl = ev.target.result;
                await saveSetting('bgImage', dataUrl);
                applyBackground(dataUrl);
                document.getElementById('bg-upload-input').value = '';
            };
            reader.readAsDataURL(file);
        }

        async function clearBgHandler() {
            await deleteSetting('bgImage');
            applyBackground(null);
        }

        async function deleteSoundHandler(id) {
            // Clean up active playing audio instance
            if (audioPlayers[id]) {
                audioPlayers[id].pause();
                delete audioPlayers[id];
            }

            // Clean up binding occurrences of this sound across ALL presets
            for (const preset of presets) {
                let changed = false;
                Object.keys(preset.bindings).forEach(key => {
                    if (preset.bindings[key] === id) {
                        delete preset.bindings[key];
                        changed = true;
                    }
                });
                if (changed) {
                    await savePreset(preset);
                }
            }

            await deleteSound(id);
            await reloadData();
        }

        function startBinding(id) {
            const sound = sounds.find(s => s.id === id);
            if (!sound) return;

            state.bindingSoundId = id;
            bindTargetName.innerText = sound.name;
            bindOverlay.classList.remove('hidden');
        }

        async function executeBinding(code) {
            const soundId = state.bindingSoundId;
            state.bindingSoundId = null;
            bindOverlay.classList.add('hidden');

            const activePreset = presets.find(p => p.id === activePresetId);
            if (!activePreset) return;

            // Exclusive bind constraint within current preset: Remove target sound from any other keys first
            Object.keys(activePreset.bindings).forEach(key => {
                if (activePreset.bindings[key] === soundId) {
                    delete activePreset.bindings[key];
                }
            });

            // Assign to new targeted key inside current active preset
            activePreset.bindings[code] = soundId;
            await savePreset(activePreset);

            await reloadData();
        }

        function cancelBinding() {
            state.bindingSoundId = null;
            bindOverlay.classList.add('hidden');
        }

        // --- Playback Logic ---
        function togglePlay(code) {
            const activePreset = presets.find(p => p.id === activePresetId);
            if (!activePreset) return;

            const soundId = activePreset.bindings[code];
            const sound = soundId ? sounds.find(s => s.id === soundId) : null;
            if (!sound) return; // Unbound key on current preset

            state.lastPlayedSoundId = sound.id; // Record as last played

            let audio = audioPlayers[sound.id];
            
            // Lazy load audio instance
            if (!audio) {
                audio = new Audio(sound.data);
                audio.loop = false;
                audio.onended = () => {
                    audio.currentTime = 0;
                    audio.paused = true;
                    updateKeyboardVisuals();
                };
                audioPlayers[sound.id] = audio;
            }

            // ENFORCE SINGLE AUDIO PLAYBACK (Stop other audios)
            for (let pid in audioPlayers) {
                if (pid !== sound.id && (!audioPlayers[pid].paused || audioPlayers[pid].currentTime > 0)) {
                    audioPlayers[pid].pause();
                    audioPlayers[pid].currentTime = 0;
                }
            }

            // State Machine
            if (audio.paused) {
                // If paused or stopped, play
                audio.loop = false; // Normal plays do not loop
                audio.play();
            } else {
                // If playing, pause
                audio.pause();
            }
            updateKeyboardVisuals();
        }

        function stopAll() {
            let changes = false;
            for (let id in audioPlayers) {
                const audio = audioPlayers[id];
                if (!audio.paused || audio.currentTime > 0) {
                    audio.pause();
                    audio.currentTime = 0;
                    changes = true;
                }
            }
            if (changes) updateKeyboardVisuals();
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            // Re-calibrate layout scrolling dimensions if the window is resized
            window.addEventListener('resize', initMarquees);

            // Presets Header Actions
            btnAddPreset.addEventListener('click', addNewPreset);
            document.getElementById('btn-cancel-preset').addEventListener('click', closePresetModal);
            document.getElementById('btn-save-preset').addEventListener('click', savePresetName);
            document.getElementById('btn-delete-preset').addEventListener('click', deleteActivePreset);

            // Upload Input
            document.getElementById('upload-input').addEventListener('change', handleUpload);
            
            // Background Image Inputs
            document.getElementById('bg-upload-input').addEventListener('change', handleBgUpload);
            document.getElementById('btn-clear-bg').addEventListener('click', clearBgHandler);

            // UI View Toggles
            document.getElementById('btn-open-library').addEventListener('click', () => {
                state.isLibraryOpen = true;
                libraryView.classList.remove('hidden');
            });

            document.getElementById('btn-close-library').addEventListener('click', () => {
                state.isLibraryOpen = false;
                libraryView.classList.add('hidden');
            });

            // Global Keydown Router
            window.addEventListener('keydown', (e) => {
                if (e.repeat) return; // Ignore hold repetition

                // 1. Check if edit preset modal is active (Enter/Escape handler)
                if (!presetModal.classList.contains('hidden')) {
                    if (e.code === 'Enter') {
                        e.preventDefault();
                        savePresetName();
                    } else if (e.code === 'Escape') {
                        e.preventDefault();
                        closePresetModal();
                    }
                    return;
                }

                // Intercept Tab for loop last played feature
                if (e.code === 'Tab') {
                    e.preventDefault(); // Prevent focus switching
                    if (state.bindingSoundId) return; // Ignore tab while binding
                    
                    if (!state.isLibraryOpen && state.lastPlayedSoundId) {
                        const audio = audioPlayers[state.lastPlayedSoundId];
                        if (audio) {
                            audio.pause();
                            audio.currentTime = 0;
                            audio.loop = true; // Turn on loop
                            audio.play();
                            updateKeyboardVisuals();
                        }
                    }
                    return;
                }

                // 2. If currently waiting for a key bind
                if (state.bindingSoundId) {
                    e.preventDefault();
                    if (e.code === 'Escape') {
                        cancelBinding();
                    } else if (validKeyCodes.has(e.code)) {
                        executeBinding(e.code);
                    }
                    return;
                }

                // 3. Global Escape behavior
                if (e.code === 'Escape') {
                    if (state.isLibraryOpen) {
                        state.isLibraryOpen = false;
                        libraryView.classList.add('hidden');
                    }
                    return;
                }

                // Ignore keyboard playback if typing in an input
                if (e.target.tagName === 'INPUT') return;

                // 4. Spacebar Stops All
                if (e.code === 'Space') {
                    e.preventDefault(); // Prevent scrolling
                    stopAll();
                    return;
                }

                // 5. Playback Routing (Only if not in library view)
                if (!state.isLibraryOpen && validKeyCodes.has(e.code)) {
                    e.preventDefault(); // Prevent default browser shortcuts when playing
                    togglePlay(e.code);
                }
            });
        }

        // --- Boot ---
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
